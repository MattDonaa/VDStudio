[build]
  # This tells Netlify to run your full SEO pipeline
  command = "npm run build"
  
  # This tells Netlify where Vite outputs the final HTML files
  publish = "dist"

# This handles client-side routing fallbacks for any pages you didn't pre-render
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
